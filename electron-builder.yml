# NOTE: no `electronFuses` block here. The installed electron-builder (25.1.8 /
# app-builder-lib 25.1.8) has no fuses support (the key is absent from its config
# schema), so adding it would fail validation rather than flip any fuse. Revisit
# once electron-builder is upgraded to a version that supports electronFuses; when
# doing so, keep `enableEmbeddedAsarIntegrityValidation` OFF — this project ships
# unsigned (signAndEditExecutable: false) and integrity validation breaks unsigned
# Windows builds.
appId: com.jasonlin.pebblestudio
productName: Pebble Studio
directories:
  output: release
files:
  - dist/**/*
  - package.json
asar: true
extraResources:
  - from: vendor/timeshim
    to: timeshim
    filter: ["timeshim.c", "timeshim-x86_64.so"]
  # Native-Windows time shim: an injected DLL that fakes qemu's wall clock (the
  # Windows analog of the LD_PRELOAD .so). launcher.exe wraps qemu via
  # PEBBLE_QEMU_PATH and injects timeshim-win.dll; probe.exe is the self-test
  # target. Resolved under resourcesPath/timeshim-win (packaged) or vendor/ (dev).
  - from: vendor/timeshim-win
    to: timeshim-win
    filter: ["timeshim-win.dll", "launcher.exe", "probe.exe"]
  # Native-Windows self-contained emulator stack. winRuntime.ts resolves each of
  # these under process.resourcesPath when packaged (and under vendor/ in dev).
  - from: vendor/qemu-pebble-win
    to: qemu-pebble-win
    # Ship only the runtime: qemu-pebble.exe + the 14 DLLs + pc-bios. Exclude the
    # dev-only qemu-pebble.exe.pre-* rebuild backups (~75 MB) and the repo notes.
    filter: ["**/*", "!*.pre-*", "!README.md", "!gate-screenshot.png"]
  - from: vendor/pebble-py
    to: pebble-py
  - from: vendor/pebble-sdk
    to: pebble-sdk
win:
  icon: build/icon.ico
  target:
    - dir
  artifactName: "Pebble Studio ${version}.${ext}"
  signAndEditExecutable: false
  sign: null
# Note: NSIS installer target is intentionally omitted here because building
# an NSIS .exe installer requires wine (or a native Windows machine).
# To build the installer, run `npm run dist` on Windows or Linux with wine.
